<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Payapi</title>
  </head>
  <body>
    <!-- HEADER -->

    <header class="header">
      <div class="header__main-wrapper">
        <div class="container header__container">
          <a class="header__link" href="#">
            <img
              src="./image/site-logo.svg"
              alt="A logo of the website"
              width="135"
              height="38"
            />
          </a>

          <div class="header__right">
            <ul class="header__list">
              <li class="header__item">
                <a class="header__item-link" href="#"> Pricing </a>
              </li>
              <li class="header__item">
                <a class="header__item-link" href="#"> About </a>
              </li>
              <li class="header__item">
                <a class="header__item-link" href="#"> Contact </a>
              </li>
            </ul>

            <button class="main-btn">Schedule a Demo</button>
          </div>

          <button class="header__hamburger"></button>
        </div>

        <!-- HERO -->

        <section class="hero">
          <div class="container hero__container">
            <div class="hero__left">
              <h1 class="hero__heading">
                Start building with our APIs for absolutely free.
              </h1>

              <form class="hero__form" action="https://echo.htmlacademy.ru/">
                <label class="visually-hidden" for="name">Enter email</label>
                <input
                  class="hero__email"
                  type="text"
                  name="email"
                  id="email"
                  placeholder="Enter email address"
                />

                <button class="main-btn hero__btn">Schedule a Demo</button>
              </form>

              <div class="hero__form-help">
                <p class="hero__form-help-desc">
                  Have any questions?
                  <a class="hero__form-help-link" href="#">Contact Us</a>
                </p>
              </div>
            </div>

            <picture class="hero__picture">
              <source
                media="(max-width: 600px;)"
                type="image/webp"
                srcset="
                  ./image/telphone-mobile.webp    1x,
                  ./image/telphone-mobile@2x.webp 2x
                "
              />

              <source
                media="(max-width: 1040px)"
                type="image/webp"
                srcset="
                  ./image/telphone-tablet.webp    1x,
                  ./image/telphone-tablet@2x.webp 2x
                "
              />

              <source
                type="image/webp"
                srcset="
                  ./image/telphone-desktop.webp    1x,
                  ./image/telphone-desktop@2x.webp 2x
                "
              />

              <source
                media="(max-width: 1040px)"
                alt="A picture of mobile phone"
                srcset="
                  ./image/telphone-mobile.webp    1x,
                  ./image/telphone-mobile@2x.webp 2x
                "
              />

              <source
                media="(max-width: 1040px)"
                alt="A picture of mobile phone"
                srcset="
                  ./image/telphone-tablet.png    1x,
                  ./image/telphone-tablet@2x.png 2x
                "
              />

              <img
                class="hero__img"
                src="./image/telphone-desktop.png"
                srcset="
                  ./image/telphone-desktop.png    1x,
                  ./image/telphone-desktop@2x.png 2x
                "
                alt="A picture of mobile phone"
                width="450"
                height="500"
              />
            </picture>
          </div>
        </section>
      </div>
    </header>

    <script src="./js/script.js"></script>
  </body>
</html>
