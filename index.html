<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Payapi</title>
  </head>
  <body>
    <!-- HEADER -->

    <header class="header">
      <div class="header__main-wrapper">
        <div class="container header__container">
          <a class="header__link" href="#">
            <img
              src="./image/site-logo.svg"
              alt="A logo of the website"
              width="135"
              height="38"
            />
          </a>

          <div class="header__right">
            <ul class="header__list">
              <li class="header__item">
                <a class="header__item-link" href="#"> Pricing </a>
              </li>
              <li class="header__item">
                <a class="header__item-link" href="#"> About </a>
              </li>
              <li class="header__item">
                <a class="header__item-link" href="#"> Contact </a>
              </li>
            </ul>

            <button class="main-btn">Schedule a Demo</button>
          </div>

          <button class="header__hamburger"></button>
        </div>

        <!-- HERO -->

        <section class="hero">
          <div class="container">
            <div class="hero__left">
              <h1 class="hero__heading">
                Start building with our APIs for absolutely free.
              </h1>

              <form class="hero__form" action="https://echo.htmlacademy.ru/">
                <label class="visually-hidden" for="name">Enter email</label>
                <input
                  class="hero__email"
                  type="text"
                  name="email"
                  id="email"
                  placeholder="Enter email address"
                />

                <button class="main-btn hero__btn">Schedule a Demo</button>
              </form>
            </div>
          </div>
        </section>
      </div>
    </header>

    <script src="./js/script.js"></script>
  </body>
</html>
